<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANDRSwerty - Bio</title>
    <style>
        /* minimalist reset – just to erase default margins/paddings */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* black background for the whole page */
            background-color: #000000;
            
            /* use flexbox to push content to the middle */
            min-height: 100vh;
            display: flex;
            align-items: center;   /* vertical center */
            justify-content: center; /* horizontal center */
            
            /* fallback font – clean, nothing fancy */
            font-family: system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* the white text in the middle */
        .center-text {
            color: #ffffff;          /* white */
            font-size: clamp(3rem, 15vw, 12rem); /* big, but scales nicely */
            font-weight: 500;         /* medium weight – not too bold, not too light */
            line-height: 1.1;
            letter-spacing: 0.02em;   /* tiny breathing */
            text-align: center;
            word-break: break-word;   /* if screen becomes extremely narrow */
            text-shadow: 0 0 10px rgba(255,255,255,0.3); /* very subtle glow — still white */
        }

        /* optional: make it pixel perfect on huge displays */
        html {
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- simple element: only the exact string "ANDRSwerty" -->
    <div class="center-text">ANDRSwerty</div>

    <!-- no javascript needed, but we keep a minimal console greet (optional) -->
    <script>
        (function() {
            // extremely light – just to prove js is present, but does not change anything visual.
            // you can delete this if you want pure css/html, but the task asked for a single file
            // with html, css, js. this script does absolutely nothing to the style or content.
            // it only logs a silent message (invisible to the user).
            if (window.console) {
                console.log("Зачем ты сюда смотриш???");
            }
        })();
    </script>
</body>
</html>
